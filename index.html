
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiza Karamat | Senior SQA Engineer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'slow-bounce': 'bounce 3s infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }
        
        /* Section offset for sticky header */
        section {
            scroll-margin-top: 80px;
        }

        /* Reveal on scroll animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .reveal-right.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Staggered children */
        .stagger-container > * {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .stagger-container.active > * {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-container.active > *:nth-child(1) { transition-delay: 0.1s; }
        .stagger-container.active > *:nth-child(2) { transition-delay: 0.2s; }
        .stagger-container.active > *:nth-child(3) { transition-delay: 0.3s; }
        .stagger-container.active > *:nth-child(4) { transition-delay: 0.4s; }
        .stagger-container.active > *:nth-child(5) { transition-delay: 0.5s; }
        .stagger-container.active > *:nth-child(6) { transition-delay: 0.6s; }
        .stagger-container.active > *:nth-child(7) { transition-delay: 0.7s; }
        .stagger-container.active > *:nth-child(8) { transition-delay: 0.8s; }

        ::selection {
            background: #2563eb;
            color: white;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="transition-colors duration-500 bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script>
        function reveal() {
            const reveals = document.querySelectorAll(".reveal, .reveal-left, .reveal-right, .stagger-container");
            const windowHeight = window.innerHeight;
            reveals.forEach(element => {
                const elementTop = element.getBoundingClientRect().top;
                const elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    element.classList.add("active");
                }
            });
        }
        window.addEventListener("scroll", reveal);
        window.addEventListener("load", () => setTimeout(reveal, 100));
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
